<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Box - 在线 JSON 工具箱</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
}
.header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: .15s;
}
.btn:hover { background: #1c2333; border-color: var(--accent); }
.btn:active { transform: scale(.97); }
.btn-primary {
  background: #1f6feb;
  border-color: #1f6feb;
  color: #fff;
}
.btn-primary:hover { background: #388bfd; }
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  height: calc(100vh - 145px);
}
@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; height: auto; }
  .main > div { min-height: 300px; }
}
.panel { display: flex; flex-direction: column; }
.panel-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.panel-body { flex: 1; position: relative; }
.panel-body textarea {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 16px;
  resize: none;
  outline: none;
  tab-size: 2;
}
.panel-body textarea::placeholder { color: #484f58; }
#output {
  overflow: auto;
  white-space: pre-wrap;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 16px;
  word-break: break-all;
}
#output .error { color: var(--red); }
#output .key { color: #79c0ff; }
#output .string { color: #a5d6ff; }
#output .number { color: #79c0ff; }
#output .boolean { color: #ff7b72; }
#output .null { color: #d2a8ff; }
#output .bracket { color: var(--muted); }
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  padding: 8px 16px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  transition: .15s;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.badge {
  display: inline-block;
  background: #1c2333;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--muted);
}
.footer {
  border-top: 1px solid var(--border);
  padding: 10px 24px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.status-bar {
  padding: 4px 16px;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}
.coffee-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #ffdd00;
  color: #000;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: .15s;
}
.coffee-btn:hover { background: #ffed4a; transform: scale(1.02); }
.drop-zone {
  position: absolute;
  inset: 0;
  border: 2px dashed var(--border);
  border-radius: 8px;
  margin: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(22,27,34,.9);
  opacity: 0;
  pointer-events: none;
  transition: .2s;
  font-size: 14px;
  color: var(--muted);
  z-index: 10;
}
.drop-zone.show {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>
<body>

<div class="header">
  <h1><span>JSON</span> Box</h1>
  <div class="header-actions">
    <button class="btn" onclick="loadExample()">📦 示例</button>
    <button class="btn" onclick="clearInput()">🗑️ 清空</button>
    <button class="btn" onclick="copyResult()">📋 复制结果</button>
    <a class="coffee-btn" href="https://ifdian.net/a/zhangsan5" target="_blank" rel="noopener">
      ⚡ 爱发电支持
    </a>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="format" onclick="switchTab('format')">格式化</div>
  <div class="tab" data-tab="minify" onclick="switchTab('minify')">压缩</div>
  <div class="tab" data-tab="validate" onclick="switchTab('validate')">验证</div>
  <div class="tab" data-tab="tree" onclick="switchTab('tree')">树形</div>
</div>

<div class="main">
  <div class="panel" style="border-right:1px solid var(--border)">
    <div class="panel-header">
      输入 <span class="badge" id="inputSize">0 B</span>
    </div>
    <div class="panel-body">
      <textarea id="input" placeholder='粘贴 JSON 或拖入文件&#10;&#10;示例:&#10;{"name": "JSON Box", "version": 1}' spellcheck="false" oninput="process()" ondrop="handleDrop(event)" ondragover="event.preventDefault()"></textarea>
      <div class="drop-zone" id="dropZone">📁 拖放文件到此处</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      输出 <span class="badge" id="outputSize">0 B</span>
    </div>
    <div class="panel-body" id="output"></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">就绪</span>
  <span id="lineCount">0 行 / 0 字符</span>
</div>

<div class="footer">
  <span>JSON Box — 免费在线工具 · 数据仅存于本地浏览器</span>
</div>

<script>
let currentTab = 'format';
let currentJson = null;

function process() {
  const raw = document.getElementById('input').value;
  updateStats(raw);
  
  if (!raw.trim()) {
    document.getElementById('output').innerHTML = '';
    document.getElementById('statusText').textContent = '就绪';
    document.getElementById('outputSize').textContent = '0 B';
    return;
  }

  try {
    currentJson = JSON.parse(raw);
    document.getElementById('statusText').textContent = '✅ 有效 JSON';
    renderOutput(currentJson, raw);
  } catch (e) {
    document.getElementById('output').innerHTML = `<span class="error">❌ ${escapeHtml(e.message)}</span>`;
    document.getElementById('statusText').textContent = '❌ 无效 JSON';
    currentJson = null;
  }
}

function renderOutput(json, raw) {
  const out = document.getElementById('output');
  
  switch (currentTab) {
    case 'format':
      out.innerHTML = syntaxHighlight(JSON.stringify(json, null, 2));
      document.getElementById('outputSize').textContent = formatSize(JSON.stringify(json, null, 2).length);
      break;
    case 'minify':
      const min = JSON.stringify(json);
      out.textContent = min;
      document.getElementById('outputSize').textContent = formatSize(min.length);
      break;
    case 'validate':
      out.innerHTML = `<span style="color:var(--green)">✅ JSON 有效</span>\n\n` +
        `<span class="key">类型:</span> ${getJsonType(json)}\n` +
        `<span class="key">根层级数:</span> ${getDepth(json)}\n` +
        `<span class="key">键数量(顶层):</span> ${Object.keys(json).length}\n` +
        (Array.isArray(json) ? `<span class="key">数组长度:</span> ${json.length}\n` : '') +
        `<span class="key">总大小:</span> ${formatSize(raw.length)}`;
      document.getElementById('outputSize').textContent = formatSize(raw.length);
      break;
    case 'tree':
      out.innerHTML = renderTree(json);
      document.getElementById('outputSize').textContent = formatSize(raw.length);
      break;
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (currentJson) {
    renderOutput(currentJson, document.getElementById('input').value);
  } else {
    document.getElementById('output').innerHTML = '';
  }
}

function syntaxHighlight(objStr) {
  return objStr
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "([^"]+)"/g, ': <span class="string">"$1"</span>')
    .replace(/: (\d+(\.\d+)?)/g, ': <span class="number">$1</span>')
    .replace(/: (true|false)/g, ': <span class="boolean">$1</span>')
    .replace(/: (null)/g, ': <span class="null">$1</span>')
    .replace(/([{}[\]])/g, '<span class="bracket">$1</span>');
}

function renderTree(obj, depth = 0) {
  if (obj === null) return '<span class="null">null</span>';
  if (typeof obj === 'string') return `<span class="string">"${escapeHtml(obj)}"</span>`;
  if (typeof obj === 'number') return `<span class="number">${obj}</span>`;
  if (typeof obj === 'boolean') return `<span class="boolean">${obj}</span>`;
  
  const indent = '  '.repeat(depth);
  const childIndent = '  '.repeat(depth + 1);
  let html = '';
  
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<span class="bracket">[</span><span class="bracket">]</span>';
    html += `<span class="bracket">[</span><br>`;
    obj.forEach((item, i) => {
      html += childIndent + renderTree(item, depth + 1);
      if (i < obj.length - 1) html += ',';
      html += '<br>';
    });
    html += indent + `<span class="bracket">]</span>`;
  } else {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span class="bracket">{</span><span class="bracket">}</span>';
    html += `<span class="bracket">{</span><br>`;
    keys.forEach((key, i) => {
      html += childIndent + `<span class="key">"${escapeHtml(key)}"</span>: ${renderTree(obj[key], depth + 1)}`;
      if (i < keys.length - 1) html += ',';
      html += '<br>';
    });
    html += indent + `<span class="bracket">}</span>`;
  }
  return html;
}

function getJsonType(val) {
  if (val === null) return 'null';
  if (Array.isArray(val)) return 'array';
  return typeof val;
}

function getDepth(val, d = 0) {
  if (typeof val !== 'object' || val === null) return d;
  return Math.max(...Object.values(val).map(v => getDepth(v, d + 1)));
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function updateStats(str) {
  const chars = str.length;
  const lines = str ? str.split('\n').length : 0;
  document.getElementById('lineCount').textContent = `${lines} 行 / ${chars} 字符`;
  document.getElementById('inputSize').textContent = formatSize(chars);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function loadExample() {
  document.getElementById('input').value = JSON.stringify({
    "name": "JSON Box",
    "version": "1.0.0",
    "description": "在线 JSON 工具箱",
    "features": ["格式化", "压缩", "验证", "树形浏览"],
    "author": { "name": "Dev", "url": null },
    "stats": { "users": 1024, "active": true }
  }, null, 2);
  process();
}

function clearInput() {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('statusText').textContent = '就绪';
  document.getElementById('outputSize').textContent = '0 B';
  currentJson = null;
  updateStats('');
}

function copyResult() {
  const out = document.getElementById('output');
  const text = out.textContent || out.innerText;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('statusText').textContent = '✅ 已复制到剪贴板';
    setTimeout(() => {
      if (currentJson) document.getElementById('statusText').textContent = '✅ 有效 JSON';
      else document.getElementById('statusText').textContent = '就绪';
    }, 1500);
  }).catch(() => {
    document.getElementById('statusText').textContent = '❌ 复制失败';
  });
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('show');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('input').value = ev.target.result;
    process();
  };
  reader.readAsText(file);
}

// Drop zone
const dropZone = document.getElementById('dropZone');
const input = document.getElementById('input');

input.addEventListener('dragenter', () => dropZone.classList.add('show'));
input.addEventListener('dragleave', (e) => {
  if (!input.contains(e.relatedTarget)) dropZone.classList.remove('show');
});
input.addEventListener('drop', () => dropZone.classList.remove('show'));

// Load example on first visit
if (!document.getElementById('input').value.trim()) {
  loadExample();
}

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    process();
  }
});
</script>
</body>
</html>
